# CycleLayerNet v0 (Brayton physics) and v1 (multi-task health params)
#
# !! GPU config — stride_train=5, num_workers=4, stride_eval=1 !!
# On CPU this takes ~20 min.  Use cpu_cyclelayer.yaml for a ~5-min first test.
#
# model.type:
#   "cyclelayer"    – v0: Encoder -> BraytonCycleLayer -> PrognosticsHead
#   "cyclelayer_v1" – v1: Encoder -> theta_hat -> PrognosticsHead (multi-task)

seed: 42

# ── Data ─────────────────────────────────────────────────────────────────────
data:
  hdf5_path: "data/NCMAPSS/N-CMAPSS_DS01-005.h5"
  window_size: 30
  stride_train: 5               # stride for training DataLoader (fewer windows)
  stride_eval: 1                # stride used by evaluate.py (full trajectory)
  use_virtual_sensors: false
  val_split: 0.15
  test_split: 0.15
  batch_size: 256
  num_workers: 4
  max_rul: 99                   # DS01 RUL range is 0-99
  # split_dir: "splits/N-CMAPSS_DS01-005"

# ── Model ─────────────────────────────────────────────────────────────────────
model:
  type: "cyclelayer_v1"         # switch to "cyclelayer" for v0

  # Shared encoder settings
  n_features: 18                # 4 op-conditions + 14 X_s sensors
  window_size: 30
  cnn_channels: [32, 64, 64]
  encoder_kernel_size: 3
  encoder_mlp_hidden: 128
  encoder_dropout: 0.2
  prog_hidden_sizes: [64, 32]
  prog_dropout: 0.1
  max_rul: 99

  # v1 only: health parameter dimension (N-CMAPSS T_dev has 10 columns)
  n_health_params: 10

  # v0 only: Brayton cycle physical constants
  n_theta: 5                    # [T1, pi, T3, eta_c, eta_t]
  gamma: 1.4
  cp: 1005.0

# ── Training ──────────────────────────────────────────────────────────────────
training:
  epochs: 50
  lr: 1.0e-4                    # 1e-4: reduced from 3e-4 to fix gnorm=NaN at epoch 1
                                # use 1e-3 only for very sparse stride (>=100)
  weight_decay: 1.0e-4
  mse_weight: 1.0
  asymmetry: 0.1                # was 0.5; less downward bias on high-RUL predictions

  # Gradient clipping (highly recommended for stability with dense training)
  # Set to 0 or null to disable.
  grad_clip_norm: 0.5           # reduced from 1.0; tighter clip to prevent gnorm=inf spikes

  # Multi-task theta supervision (v1 only; ignored for v0)
  # "delayed" schedule is best for stride_train=5: lets the RUL head converge
  # for warmup epochs before theta supervision kicks in, avoiding early spikes.
  # "step": stay at start for warmup epochs, then jump to end
  # "linear": linearly interpolate start->end over warmup epochs
  # "delayed": 0 for warmup epochs, then ramp 0->end over next warmup epochs
  lambda_theta_start: 1.0       # lambda at epoch 1 (step/linear); ignored by "delayed"
  lambda_theta_end: 0.1         # target lambda after warmup
  lambda_theta_warmup_epochs: 5   # 5: ramp starts ep6 → useful signal before early stop
  lambda_theta_schedule: "delayed"  # CHANGED: "delayed" recommended for stride=5
  huber_delta: 0.1

  # Physics penalties (v0 PhysicsInformedLoss; ignored when lambda_theta > 0)
  use_physics_loss: false       # set true to enable for cyclelayer v0
  feasibility_weight: 0.1
  monotonicity_weight: 0.05

  use_amp: true
  early_stopping_patience: 15
  output_dir: "runs/cyclelayer_v1"

# ── Evaluation ────────────────────────────────────────────────────────────────
evaluation:
  checkpoint: "runs/cyclelayer_v1/best.pt"
  alpha: 0.2
