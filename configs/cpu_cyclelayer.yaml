# CPU first-test config for cyclelayer_v1 — target: ~5 min on a modern laptop
#
# Why this is fast vs cyclelayer.yaml:
#   stride_train 5→50    :  10x fewer train batches/epoch   (~160k vs ~534k windows)
#   stride_eval  1→100   :  100x fewer val windows/epoch    (7k vs 670k windows)
#   num_workers  4→0     :  no Windows process-spawn overhead (~3-5s saved/epoch)
#   batch_size 256→512   :  2x fewer gradient steps/epoch
#   epochs      50→25    :  shorter run (early-stop patience still applies)
#
# Use cyclelayer.yaml (+ GPU) for full research runs.
# Reuses splits from the standard run if they exist.

seed: 42

data:
  hdf5_path: "data/NCMAPSS/N-CMAPSS_DS01-005.h5"
  window_size: 30
  stride_train: 50          # ~160k train windows   (~6s/epoch on CPU)
  stride_eval: 100          # ~7k val windows       (<1s eval on CPU)
  use_virtual_sensors: false
  val_split: 0.15
  test_split: 0.15
  batch_size: 512           # 2x larger → half the gradient steps
  num_workers: 0            # CRITICAL: 0 avoids Windows spawn overhead
  max_rul: 99
  split_dir: "splits/N-CMAPSS_DS01-005"

model:
  type: "cyclelayer_v1"

  n_features: 18
  window_size: 30
  cnn_channels: [32, 64, 64]
  encoder_kernel_size: 3
  encoder_mlp_hidden: 128
  encoder_dropout: 0.2
  prog_hidden_sizes: [64, 32]
  prog_dropout: 0.1
  max_rul: 99
  n_health_params: 10

  n_theta: 5
  gamma: 1.4
  cp: 1005.0

training:
  epochs: 25
  lr: 1.0e-3                # 1e-3 is fine for stride=50 (sparse enough)
  weight_decay: 1.0e-4
  mse_weight: 1.0
  asymmetry: 0.1                # was 0.5; 0.1 still penalises over-est. but less downward bias

  grad_clip_norm: 1.0

  lambda_theta_start: 1.0         # ignored by "delayed" schedule
  lambda_theta_end: 0.1
  lambda_theta_warmup_epochs: 5   # "delayed": epochs 1-5 pure RUL, epochs 6-10 ramp 0→0.1
  lambda_theta_schedule: "delayed" # IMPORTANT: lets RUL head converge before theta kicks in
                                   # "step" at epoch 3 forces lambda=1.0 → theta dominates →
                                   # encoder diverted → RUL head predicts near training mean (~60)
  huber_delta: 0.1

  use_physics_loss: false
  use_amp: false            # AMP only helps on CUDA — disable for CPU
  early_stopping_patience: 8
  output_dir: "runs/cpu_cyclelayer_v1"

evaluation:
  checkpoint: "runs/cpu_cyclelayer_v1/best.pt"
  alpha: 0.2
