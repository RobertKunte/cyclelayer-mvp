# CPU first-test config for CNN/LSTM baselines — target: ~5 min on a modern laptop
#
# Why this is fast vs baseline.yaml:
#   stride_train 5→50    :  10x fewer train batches/epoch   (~160k vs ~534k windows)
#   stride_eval  1→100   :  100x fewer val windows/epoch    (7k vs 670k windows)
#   num_workers  4→0     :  no Windows process-spawn overhead (~3-5s saved/epoch)
#   batch_size 256→512   :  2x fewer gradient steps/epoch
#   epochs      50→25    :  shorter run (early-stop patience still applies)
#
# Use baseline.yaml (+ GPU) for full research runs.
# Reuses splits from the standard run if they exist.

seed: 42

data:
  hdf5_path: "data/NCMAPSS/N-CMAPSS_DS01-005.h5"
  window_size: 30
  stride_train: 50          # ~160k train windows   (~4s/epoch on CPU)
  stride_eval: 100          # ~7k val windows       (<1s eval on CPU)
  use_virtual_sensors: false
  val_split: 0.15
  test_split: 0.15
  batch_size: 512           # 2x larger → half the gradient steps
  num_workers: 0            # CRITICAL: 0 avoids Windows spawn overhead
  max_rul: 99
  split_dir: "splits/N-CMAPSS_DS01-005"

model:
  type: "cnn"

  cnn:
    channels: [64, 128, 128]
    kernel_size: 3
    mlp_hidden: 128
    dropout: 0.2

  lstm:
    hidden_size: 64
    n_layers: 2
    bidirectional: true
    mlp_hidden: 64
    dropout: 0.2

training:
  epochs: 25
  lr: 1.0e-3                # 1e-3 is fine for stride=50 (sparse enough)
  weight_decay: 1.0e-4
  mse_weight: 1.0
  asymmetry: 0.1                # was 0.5; 0.1 still penalises over-est. but less downward bias
  lambda_theta: 0.0
  grad_clip_norm: 1.0
  use_amp: false            # AMP only helps on CUDA — disable for CPU
  early_stopping_patience: 8
  output_dir: "runs/cpu_baseline"

evaluation:
  checkpoint: "runs/cpu_baseline/best.pt"
  alpha: 0.2
